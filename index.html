<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,user-scalable=no"
  >

  <title>Genius Arduino</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <h1>GENIUS</h1>

  <div class="config">

    <input
      id="ip"
      placeholder="IP do Arduino"
    >

    <button
      class="connect"
      id="connectBtn"
    >
      conectar
    </button>

  </div>

  <div id="status">
    desconectado
  </div>

  <div class="grid">

    <button class="btn red" id="b0"></button>

    <button class="btn yellow" id="b1"></button>

    <button class="btn green" id="b2"></button>

    <button class="btn blue" id="b3"></button>

  </div>

  <button
    class="restart"
    id="restartBtn"
  >
    reiniciar
  </button>

  <script src="app.js"></script>

</body>
</html>
