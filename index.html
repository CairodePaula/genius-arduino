<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genius Arduino</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>GENIUS</h1>

  <div class="config">

    <input
      id="ip"
      placeholder="IP do Arduino"
    >

    <button onclick="conectar()">
      conectar
    </button>

  </div>

  <div id="status">
    desconectado
  </div>

  <div class="grid">

    <button class="btn red" onclick="clicar(0)"></button>

    <button class="btn yellow" onclick="clicar(1)"></button>

    <button class="btn green" onclick="clicar(2)"></button>

    <button class="btn blue" onclick="clicar(3)"></button>

  </div>

  <button class="restart" onclick="reiniciar()">
    reiniciar
  </button>

  <script src="app.js"></script>

</body>
</html>
